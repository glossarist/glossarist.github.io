# Lychee Link Checker Configuration
# For Documentation: https://github.com/lycheeverse/lychee

# Cache results to avoid re-checking same URLs
cache = true
max_cache_age = "1d"

# Check both source files and built site
include_verbatim = true

# File types to check
include = [
  ".vitepress/dist/**/*.html"
]

# Exclude patterns for URLs
exclude = [
  ".git",
  ".github",
  "node_modules",
  "vendor",
  ".bundle",
  ".sass-cache",
  ".jekyll-cache"
]
